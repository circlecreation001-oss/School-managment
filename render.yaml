services:
  - type: web
    name: education-erp-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npx prisma generate --schema=packages/database/prisma/schema.prisma && npm run build:api
    startCommand: node apps/api/dist/server.mjs
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: "4000"
      - key: API_PREFIX
        value: /api/v1
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: "15m"
      - key: JWT_REFRESH_EXPIRY
        value: "7d"
      - key: CORS_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: LOG_FORMAT
        value: json
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      - key: ENCRYPTION_KEY
        generateValue: true
